name: Build Windows

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase qttools'
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Configure and Build nanoC++
      run: |
        mkdir build-nanoC++
        cd build-nanoC++
        cmake ../nanoC++ -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
    
    - name: Configure and Build nanoPython
      run: |
        mkdir build-nanoPython
        cd build-nanoPython
        cmake ../nanoPython -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
    
    - name: Deploy Qt dependencies
      run: |
        windeployqt build-nanoC++/Release/nanoC++.exe --release
        windeployqt build-nanoPython/Release/nanoPython.exe --release
    
    - name: Create distribution directory
      run: |
        mkdir dist
        cp -r build-nanoC++/Release dist/nanoC++
        cp -r build-nanoPython/Release dist/nanoPython
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nanoCompiler-Windows
        path: dist/
        retention-days: 30
