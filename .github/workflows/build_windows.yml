name: Build Windows

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase qttools'
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Install Ninja
      run: choco install ninja -y
    
    - name: Build nanoC++
      run: |
        mkdir build-nanoC++
        cd build-nanoC++
        cmake ../nanoC++ -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        ninja
    
    - name: Build nanoPython
      run: |
        mkdir build-nanoPython
        cd build-nanoPython
        cmake ../nanoPython -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        ninja
    
    - name: Deploy Qt dependencies
      run: |
        windeployqt build-nanoC++/nanoC++.exe --release
        windeployqt build-nanoPython/nanoPython.exe --release
    
    - name: Create distribution directory
      run: |
        mkdir dist
        cp -r build-nanoC++ dist/
        cp -r build-nanoPython dist/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nanoCompiler-Windows
        path: dist/
        retention-days: 30
