name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase qttools'
        tools: 'tools_cmake tools_ninja'
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Download TinyCC
      run: |
        mkdir -p third_party/tcc
        curl -L -o tcc.zip https://github.com/TinyCC/tinycc/releases/download/tcc-0.9.27/tcc-0.9.27-win64-bin.zip
        unzip tcc.zip -d third_party/tcc
        rm tcc.zip
      shell: bash
    
    - name: Download MicroPython
      run: |
        mkdir -p third_party/micropython
        curl -L -o micropython.zip https://github.com/micropython/micropython/releases/download/v1.22.0/micropython-1.22.0-windows.zip
        unzip micropython.zip -d third_party/micropython
        rm micropython.zip
      shell: bash
    
    - name: Build nanoC++
      run: |
        mkdir build-nanoC++
        cd build-nanoC++
        cmake ../nanoC++ -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        ninja
      shell: bash
    
    - name: Build nanoPython
      run: |
        mkdir build-nanoPython
        cd build-nanoPython
        cmake ../nanoPython -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        ninja
      shell: bash
    
    - name: Deploy Qt dependencies
      run: |
        windeployqt build-nanoC++/nanoC++.exe --release
        windeployqt build-nanoPython/nanoPython.exe --release
    
    - name: Create distribution directory
      run: |
        mkdir -p dist/nanoC++
        mkdir -p dist/nanoPython
        cp -r build-nanoC++/* dist/nanoC++/
        cp -r build-nanoPython/* dist/nanoPython/
        cp -r third_party/tcc dist/nanoC++/
        cp -r third_party/micropython dist/nanoPython/
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nanoCompiler-Windows
        path: dist/
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/**
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
