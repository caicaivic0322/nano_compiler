name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase qttools'
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Install Ninja
      run: choco install ninja -y
    
    - name: Install Inno Setup
      run: choco install innosetup -y
    
    - name: Build nanoC++
      run: |
        mkdir build-nanoC++
        cd build-nanoC++
        cmake ../nanoC++ -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        ninja
    
    - name: Build nanoPython
      run: |
        mkdir build-nanoPython
        cd build-nanoPython
        cmake ../nanoPython -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        ninja
    
    - name: Deploy Qt dependencies
      run: |
        mkdir deploy
        mkdir deploy/nanoC++
        mkdir deploy/nanoPython
        cp build-nanoC++/nanoC++.exe deploy/nanoC++/
        cp build-nanoPython/nanoPython.exe deploy/nanoPython/
        windeployqt deploy/nanoC++/nanoC++.exe --release
        windeployqt deploy/nanoPython/nanoPython.exe --release
    
    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/nano_compiler_setup.iss
    
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: nanoCompiler-Installer
        path: output/*.exe
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
