# AppVeyor CI 配置文件
# 构建 Windows 版本的 nanoCompiler

version: 1.0.{build}

image: Visual Studio 2022

platform:
  - x64

configuration:
  - Release

environment:
  # AppVeyor 的 Qt 路径
  QTDIR: C:\Qt\6.6.3\msvc2019_64
  PATH: '%QTDIR%\bin;%PATH%'

init:
  - git config --global core.autocrlf input
  # 列出可用的 Qt 版本
  - dir C:\Qt\ /s /b | findstr msvc

clone_depth: 5

# 安装依赖
install:
  # 检查 Qt 是否已安装
  - if not exist "%QTDIR%\bin\qmake.exe" (
      echo "Qt not found at %QTDIR%, trying to find installed version..." &&
      for /d %%i in (C:\Qt\*) do (
        for /d %%j in (%%i\*) do (
          if exist "%%j\bin\qmake.exe" (
            set "QTDIR=%%j" &&
            set "PATH=%%j\bin;%PATH%" &&
            echo "Found Qt at %%j" &&
            goto :qt_found
          )
        )
      )
    )
  - :qt_found
  - echo "Using Qt at: %QTDIR%"
  - qmake --version

# 不使用 MSBuild，使用自定义脚本
build_script:
  # 构建 nanoC++
  - mkdir build-nanoC++
  - cd build-nanoC++
  - cmake ../nanoC++ -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QTDIR%"
  - cmake --build . --config Release
  - cd ..
  
  # 构建 nanoPython
  - mkdir build-nanoPython
  - cd build-nanoPython
  - cmake ../nanoPython -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QTDIR%"
  - cmake --build . --config Release
  - cd ..
  
  # 部署 Qt 依赖
  - windeployqt build-nanoC++/Release/nanoC++.exe --release
  - windeployqt build-nanoPython/Release/nanoPython.exe --release

after_build:
  # 创建发布目录
  - mkdir deploy
  - mkdir deploy\nanoC++
  - mkdir deploy\nanoPython
  - copy build-nanoC++\Release\nanoC++.exe deploy\nanoC++\
  - copy build-nanoPython\Release\nanoPython.exe deploy\nanoPython\
  - xcopy /E /I build-nanoC++\Release deploy\nanoC++
  - xcopy /E /I build-nanoPython\Release deploy\nanoPython

artifacts:
  - path: deploy
    name: nanoCompiler-Windows-$(APPVEYOR_BUILD_VERSION)
    type: zip

# 只在 main 分支和 tags 上构建
branches:
  only:
    - main
    - master

# 部署到 GitHub Releases（可选）
deploy:
  - provider: GitHub
    artifact: nanoCompiler-Windows-$(APPVEYOR_BUILD_VERSION).zip
    auth_token:
      secure: YOUR_ENCRYPTED_GITHUB_TOKEN
    draft: false
    prerelease: false
    on:
      appveyor_repo_tag: true
