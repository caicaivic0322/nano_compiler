# AppVeyor CI 配置文件
# 构建 Windows 版本的 nanoCompiler

version: 1.0.{build}

image: Visual Studio 2022

platform:
  - x64

configuration:
  - Release

init:
  - git config --global core.autocrlf input

clone_depth: 5

install:
  # 查找已安装的 Qt 版本
  - dir C:\Qt
  # 设置 Qt 路径（尝试多个可能的版本）
  - if exist "C:\Qt\6.6.3\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.6.3\msvc2019_64
  - if exist "C:\Qt\6.6.2\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.6.2\msvc2019_64
  - if exist "C:\Qt\6.6.1\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.6.1\msvc2019_64
  - if exist "C:\Qt\6.6.0\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.6.0\msvc2019_64
  - if exist "C:\Qt\6.5.3\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.5.3\msvc2019_64
  - if exist "C:\Qt\6.5.2\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.5.2\msvc2019_64
  - if exist "C:\Qt\6.5.1\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.5.1\msvc2019_64
  - if exist "C:\Qt\6.5.0\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\6.5.0\msvc2019_64
  # 检查 Qt 5 版本
  - if exist "C:\Qt\5.15.2\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\5.15.2\msvc2019_64
  - if exist "C:\Qt\5.15.1\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\5.15.1\msvc2019_64
  - if exist "C:\Qt\5.15.0\msvc2019_64\bin\qmake.exe" set QTDIR=C:\Qt\5.15.0\msvc2019_64
  # 设置 PATH
  - set PATH=%QTDIR%\bin;%PATH%
  # 验证 Qt
  - echo QTDIR=%QTDIR%
  - qmake --version

build_script:
  - mkdir build-nanoC++
  - cd build-nanoC++
  - cmake ..\nanoC++ -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=%QTDIR%
  - cmake --build . --config Release
  - cd ..
  - mkdir build-nanoPython
  - cd build-nanoPython
  - cmake ..\nanoPython -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=%QTDIR%
  - cmake --build . --config Release
  - cd ..
  # 检查生成的文件
  - echo "Checking build outputs..."
  - dir build-nanoC++ /s
  - dir build-nanoPython /s
  # 部署 Qt 依赖
  - windeployqt build-nanoC++\Release\nanoC++.exe --release
  - windeployqt build-nanoPython\Release\nanoPython.exe --release

after_build:
  # 显示当前目录
  - cd
  # 列出目录结构
  - dir
  # 再次检查 build 目录
  - echo "Contents of build-nanoC++:"
  - dir build-nanoC++ /s
  - echo "Contents of build-nanoPython:"
  - dir build-nanoPython /s
  # 创建发布目录
  - mkdir deploy
  - mkdir deploy\nanoC++
  - mkdir deploy\nanoPython
  # 查找并复制 exe 文件（使用通配符）
  - for /r "build-nanoC++" %%i in (*.exe) do @copy /y "%%~fi" "deploy\nanoC++\"
  - for /r "build-nanoPython" %%i in (*.exe) do @copy /y "%%~fi" "deploy\nanoPython\"
  # 复制所有依赖文件
  - for /r "build-nanoC++" %%i in (*.dll) do @copy /y "%%~fi" "deploy\nanoC++\"
  - for /r "build-nanoPython" %%i in (*.dll) do @copy /y "%%~fi" "deploy\nanoPython\"
  # 验证复制结果
  - echo "Contents of deploy:"
  - dir deploy /s

artifacts:
  - path: deploy
    name: nanoCompiler-Windows-$(APPVEYOR_BUILD_VERSION)
    type: zip

branches:
  only:
    - main
    - master
