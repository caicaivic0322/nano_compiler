# GitLab CI/CD 配置文件
# 使用 MinGW 在 Linux 上交叉编译 Windows 程序

stages:
  - build
  - package

variables:
  QT_VERSION: "6.6.0"
  MINGW_PREFIX: "x86_64-w64-mingw32"

# 构建 nanoC++
build-nanocpp:
  stage: build
  image: fedora:latest
  before_script:
    - dnf install -y mingw64-gcc-c++ mingw64-qt6-qtbase-devel cmake make git
  script:
    - mkdir build-nanoC++
    - cd build-nanoC++
    - cmake ../nanoC++ -DCMAKE_TOOLCHAIN_FILE=../cmake/mingw-w64-x86_64.cmake -DCMAKE_BUILD_TYPE=Release
    - make -j$(nproc)
  artifacts:
    paths:
      - build-nanoC++/nanoC++.exe
    expire_in: 1 week

# 构建 nanoPython
build-nanopython:
  stage: build
  image: fedora:latest
  before_script:
    - dnf install -y mingw64-gcc-c++ mingw64-qt6-qtbase-devel cmake make git
  script:
    - mkdir build-nanoPython
    - cd build-nanoPython
    - cmake ../nanoPython -DCMAKE_TOOLCHAIN_FILE=../cmake/mingw-w64-x86_64.cmake -DCMAKE_BUILD_TYPE=Release
    - make -j$(nproc)
  artifacts:
    paths:
      - build-nanoPython/nanoPython.exe
    expire_in: 1 week

# 打包
package:
  stage: package
  image: fedora:latest
  dependencies:
    - build-nanocpp
    - build-nanopython
  script:
    - mkdir -p dist/nanoC++ dist/nanoPython
    - cp build-nanoC++/nanoC++.exe dist/nanoC++/
    - cp build-nanoPython/nanoPython.exe dist/nanoPython/
    - echo "Build completed"
  artifacts:
    name: "nanoCompiler-$CI_COMMIT_REF_NAME"
    paths:
      - dist/
    expire_in: 30 days
  only:
    - tags
    - main
